<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; width: 100%; font-family: 'Segoe UI', sans-serif; background-color: #fcfaff; overflow: hidden; }
    body { display: flex; flex-direction: row; }
    .sidebar { width: 280px; min-width: 280px; background: #916bbf; display: flex; flex-direction: column; height: 100vh; box-shadow: 4px 0 15px rgba(0,0,0,0.1); z-index: 20; overflow-y: auto; }
    .logo-header { padding: 15px; text-align: center; background: white; border-bottom: 3px solid #ac8ad4; position: sticky; top: 0; }
    .tab { padding: 16px 20px; margin: 6px 0 6px 15px; background: #ac8ad4; border-radius: 25px 0 0 25px; cursor: pointer; transition: 0.3s; font-weight: 600; color: #fff; text-transform: uppercase; font-size: 0.72em; letter-spacing: 1px; }
    .tab.active { background: #fcfaff; color: #4a4e69; margin-right: -1px; }
    .main-container { flex-grow: 1; padding: 40px; box-sizing: border-box; overflow-y: auto; height: 100vh; min-width: 0; }
    .divider { height: 4px; width: 60px; background: #84a59d; margin: 15px 0 30px 0; border-radius: 2px; }
    .commentary-box { background: #fff; padding: 25px; border-radius: 15px; border-left: 10px solid #916bbf; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 25px; color: #4a4e69; line-height: 1.7; max-width: 900px; word-wrap: break-word; }
    .collection-grid { display: flex; gap: 20px; flex-wrap: wrap; }
    .category-column { flex: 1; min-width: 300px; background: #fff; border-radius: 12px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 20px; }
    .category-header { color: #916bbf; border-bottom: 2px solid #ac8ad4; margin-bottom: 15px; text-align: center; font-weight: bold; }
    .item-row { display: flex; align-items: center; margin-bottom: 10px; padding: 8px; border-bottom: 1px solid #f0f0f0; }
    .donation-img-small { width: 55px; height: 55px; object-fit: cover; border-radius: 8px; background: #eee; }
    .item-name { margin-left: 15px; font-weight: bold; color: #4a4e69; font-size: 0.85em; }
    .pictures-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
    .gallery-card { background: white; padding: 12px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
    .gallery-img { width: 100%; height: 200px; object-fit: cover; border-radius: 8px; }
    .info-line { margin-bottom: 12px; padding: 18px 22px; border-left: 8px solid #84a59d; background: white; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05); color: #4a4e69; max-width: 900px; word-wrap: break-word; }
    .donate-btn { display: inline-block; margin-top: 20px; padding: 18px 45px; background: #84a59d; color: white; border-radius: 35px; font-weight: bold; cursor: pointer; text-decoration: none; border: none; text-transform: uppercase; font-size: 1.1em; }
    .location-pin { cursor: pointer; font-size: 1.4em; margin-left: 15px; }
    
    /* New Testimonial Styles */
    .testimonial-card { background: white; border-radius: 16px; padding: 30px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; gap: 25px; max-width: 900px; align-items: flex-start; }
    .testimonial-media { width: 220px; min-width: 220px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .testimonial-img { width: 100%; height: auto; display: block; object-fit: cover; }
    .testimonial-video { width: 100%; height: 140px; border: none; display: block; }
    .testimonial-body { flex-grow: 1; color: #4a4e69; line-height: 1.6; }
    @media (max-width: 768px) { .testimonial-card { flex-direction: column; } .testimonial-media { width: 100%; min-width: 100%; } }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo-header"><img src="https://i.imgur.com/oAWTWfg.png" width="140"></div>
    <div id="tabs"></div>
  </div>
  <div class="main-container">
    <h1 id="tab-title">SHEP</h1>
    <div class="divider"></div>
    <div id="content">Syncing latest data...</div>
  </div>
  <script>
    let allData = [];
    var scriptUrlBase = "https://script.google.com/macros/s/AKfycbww5xEpevxJK-nB8fAvY6gzc-_81QG98l9PT86vsCxA_JK7OZf0uvlOPrspQjadPGGH/exec";

    fetch(scriptUrlBase)
      .then(response => response.json())
      .then(data => { 
        allData = data; 
        renderMenu(data); 
      })
      .catch(err => {
        document.getElementById('content').innerText = "Error syncing initial data. Please refresh.";
        console.error(err);
      });

    function formatBold(text) { return text.toString().replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'); }
    
    function getImgUrl(url) {
      if (!url) return 'https://i.imgur.com/oAWTWfg.png';
      var str = url.toString().trim();
      var id = "";
      if (str.indexOf('googleusercontent.com') !== -1) return str;
      if (str.indexOf('/file/d/') !== -1) { id = str.split('/file/d/')[1].split('/')[0]; } 
      else if (str.indexOf('id=') !== -1) { id = str.split('id=')[1].split('&')[0]; }
      if (id) { return 'https://drive.google.com/uc?export=view&id=' + id; }
      return 'https://i.imgur.com/oAWTWfg.png';
    }

    function getVideoEmbedUrl(url) {
      if (!url) return '';
      var str = url.toString().trim();
      var id = "";
      if (str.indexOf('/file/d/') !== -1) { id = str.split('/file/d/')[1].split('/')[0]; } 
      else if (str.indexOf('id=') !== -1) { id = str.split('id=')[1].split('&')[0]; }
      if (id) { return 'https://drive.google.com/file/d/' + id + '/preview'; }
      return '';
    }

    function renderMenu(data) {
      var tabContainer = document.getElementById('tabs');
      tabContainer.innerHTML = "";
      var cleanData = data.filter(function(row) {
        if (!row[0]) return false;
        var name = row[0].toString().toUpperCase().trim();
        return name !== "" && name !== "DONATIONFORMURL" && name !== "INSTAGRAM" && name !== "FACEBOOK";
      });
      
      cleanData.forEach(function(row, index) {
        var btn = document.createElement('div');
        btn.className = 'tab'; btn.innerText = row[0];
        btn.onclick = function() {
          document.getElementById('tab-title').innerText = row[0];
          var display = document.getElementById('content');
          var name = row[0].toUpperCase().trim();
          
          if (name === "WHAT DO WE COLLECT") {
            display.innerHTML = '<div class="collection-grid" id="coll-box">Loading...</div>';
            fetch(scriptUrlBase + "?action=collections")
              .then(response => response.json())
              .then(items => {
                var box = document.getElementById('coll-box'); box.innerHTML = "";
                var groups = {};
                items.slice(1).forEach(function(it) { 
                  if(!it[0] || it[0].trim() === "" || !it[1]) return;
                  if(!groups[it[0]]) groups[it[0]] = []; 
                  groups[it[0]].push(it); 
                });
                Object.keys(groups).forEach(function(g) {
                  var col = document.createElement('div'); col.className = 'category-column';
                  col.innerHTML = '<div class="category-header">' + g + '</div>';
                  groups[g].forEach(function(it) {
                    var r = document.createElement('div'); r.className = 'item-row';
                    r.innerHTML = '<div><img src="' + getImgUrl(it[2]) + '" class="donation-img-small"></div><div class="item-name">' + it[1] + '</div>';
                    col.appendChild(r);
                  });
                  box.appendChild(col);
                });
              }).catch(err => { document.getElementById('coll-box').innerText = "Error loading collection items."; });
            
          } else if (name === "WHAT WE CAN'T ACCEPT" || name === "WHAT WE CAN’T ACCEPT") {
            display.innerHTML = '<div class="collection-grid" id="unacceptable-box">Loading...</div>';
            fetch(scriptUrlBase + "?action=unacceptable")
              .then(response => response.json())
              .then(items => {
                var box = document.getElementById('unacceptable-box'); box.innerHTML = "";
                var groups = {};
                items.slice(1).forEach(function(it) { 
                  if(!it[0] || it[0].trim() === "" || !it[1]) return;
                  if(!groups[it[0]]) groups[it[0]] = []; 
                  groups[it[0]].push(it); 
                });
                Object.keys(groups).forEach(function(g) {
                  var col = document.createElement('div'); col.className = 'category-column';
                  col.innerHTML = '<div class="category-header" style="color: #d9534f; border-bottom: 2px solid #d9534f;">' + g + '</div>';
                  groups[g].forEach(function(it) {
                    var r = document.createElement('div'); r.className = 'item-row';
                    r.innerHTML = '<div><img src="' + getImgUrl(it[2]) + '" class="donation-img-small"></div><div class="item-name">' + it[1] + '</div>';
                    col.appendChild(r);
                  });
                  box.appendChild(col);
                });
              }).catch(err => { document.getElementById('unacceptable-box').innerText = "Error loading unacceptable items."; });
            
          } else if (name === "PICTURES") {
            display.innerHTML = '<div class="pictures-grid" id="pic-box">Loading...</div>';
            fetch(scriptUrlBase + "?action=pictures")
              .then(response => response.json())
              .then(pics => {
                var box = document.getElementById('pic-box'); box.innerHTML = "";
                pics.slice(1).forEach(function(p) {
                  if(!p[1]) return;
                  var card = document.createElement('div'); card.className = 'gallery-card';
                  card.innerHTML = '<img src="' + getImgUrl(p[1]) + '" class="gallery-img"><div style="margin-top:10px;font-weight:bold;color:#4a4e69;">' + p[0] + '</div>';
                  box.appendChild(card);
                });
              }).catch(err => { document.getElementById('pic-box').innerText = "Error loading pictures."; });

          } else if (name === "TESTIMONIALS") {
            display.innerHTML = '<div id="testimonial-box">Loading stories & media...</div>';
            
            // Call both the rows data and the media tab data simultaneously
            Promise.all([
              fetch(scriptUrlBase + "?action=testimonials").then(res => res.json()),
              Promise.resolve(allData)
            ]).then(([mediaItems, mainData]) => {
              var box = document.getElementById('testimonial-box'); box.innerHTML = "";
              
              // Get pure text paragraphs from the main sheet under TESTIMONIALS section
              var textRows = []; var capture = false;
              for(var i=0; i<mainData.length; i++) {
                if(mainData[i][0] === row[0]) { capture = true; textRows.push(mainData[i][1]); }
                else if (capture && mainData[i][0] === "") { textRows.push(mainData[i][1]); }
                else if (capture && mainData[i][0] !== "") { break; }
              }
              
              // Filter out completely blank lines
              var paragraphs = textRows.filter(p => p && p.trim() !== "");
              
              // Map media files by name matching
              var mediaMap = {};
              mediaItems.slice(1).forEach(m => { if(m[0]) mediaMap[m[0].trim().toUpperCase()] = m[1]; });

              // Build card for each paragraph story found
              paragraphs.forEach(story => {
                var card = document.createElement('div'); card.className = 'testimonial-card';
                
                // Scan the text to figure out which author it belongs to
                var matchedMediaHtml = '<div class="testimonial-media"><img src="https://i.imgur.com/oAWTWfg.png" class="testimonial-img"></div>'; 
                
                Object.keys(mediaMap).forEach(authorName => {
                  if (story.toUpperCase().includes(authorName)) {
                    var link = mediaMap[authorName];
                    if (authorName.includes("LITTLE THINGS FOR TINY TOTS")) {
                      // Embed video player frame
                      matchedMediaHtml = '<div class="testimonial-media"><iframe src="' + getVideoEmbedUrl(link) + '" class="testimonial-video" allow="autoplay"></iframe></div>';
                    } else {
                      // Treat as an image
                      matchedMediaHtml = '<div class="testimonial-media"><img src="' + getImgUrl(link) + '" class="testimonial-img"></div>';
                    }
                  }
                });
                
                card.innerHTML = matchedMediaHtml + '<div class="testimonial-body">' + formatBold(story).replace(/\n/g, '<br>') + '</div>';
                box.appendChild(card);
              });
            }).catch(err => {
              document.getElementById('testimonial-box').innerText = "Error rendering stories.";
              console.error(err);
            });

          } else if (name === "MONETARY DONATIONS") {
             display.innerHTML = `<div class="commentary-box"><h3>Your Impact Matters</h3><p>At <strong>SHEP</strong>, every dollar donated goes toward providing hygiene essentials for those in our community. Thank you for your support.</p></div><div class="info-line"><span>Account: SAFE HAVEN ESSENTIAL PACKS</span></div><div class="info-line"><span>BSB: 306821 / Acct: 6706014</span></div><center><button class="donate-btn" onclick="window.open('https://tinyurl.com/SHEPDonation', '_blank')">Complete Donation & Get Receipt</button></center>`;
          } else {
            var contentRows = []; var capture = false;
            for(var i=0; i<allData.length; i++) {
              if(allData[i][0] === row[0]) { capture = true; contentRows.push(allData[i]); }
              else if (capture && allData[i][0] === "") { contentRows.push(allData[i]); }
              else if (capture && allData[i][0] !== "") { break; }
            }
            display.innerHTML = "";
            contentRows.forEach(function(r) {
              if(!r[1]) return;
              var lines = r[1].toString().split('\n');
              lines.forEach(function(l) {
                if(!l.trim()) return;
                var rowDiv = document.createElement('div'); rowDiv.className = 'info-line';
                var pin = "";
                if(r[2] && r[2].toString().toLowerCase().includes('http')) {
                   var mapUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(l);
                   pin = '<div class="location-pin" onclick="window.open(\'' + mapUrl + '\', \'_blank\'); event.stopPropagation();">📍</div>';
                }
                rowDiv.innerHTML = '<span>' + formatBold(l) + '</span>' + pin;
                display.appendChild(rowDiv);
              });
            });
          }
          document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
          btn.classList.add('active');
        };
        tabContainer.appendChild(btn);
        if (index === 0) btn.click();
      });
    }
  </script>
</body>
</html>
